<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SawTank: Prison Break</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hud">
        <div class="hud-title">SawTank: Prison Break</div>
        <div class="hud-subtitle">Top-down room escape</div>
        <div class="hud-status" id="statusText">Find the exit.</div>
      </header>
      <main class="game-shell">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div id="dialogueBox" class="dialogue-box" aria-hidden="true">
          <div class="dialogue-left">
            <div class="dialogue-portrait">
              <img id="dialoguePortrait" src="images/bigphilly.png" alt="" />
            </div>
            <div class="dialogue-speaker" id="dialogueSpeaker">Red</div>
          </div>
          <div class="dialogue-right">
            <p class="dialogue-text" id="dialogueText"></p>
            <span class="dialogue-continue" id="dialogueContinue">Press SPACE to continue</span>
          </div>
        </div>
      </main>
    </div>

    <script src="game.js"></script>
  </body>
  </html>
