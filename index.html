<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SawTank: Prison Break</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="game-shell">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div class="vcr-overlay" aria-hidden="true"></div>
        <div id="dialogueBox" class="dialogue-box" aria-hidden="true">
          <div class="dialogue-left">
            <div class="dialogue-portrait">
              <img id="dialoguePortrait" src="images/bigphilly.png" alt="" />
            </div>
            <div class="dialogue-speaker" id="dialogueSpeaker">Red</div>
          </div>
          <div class="dialogue-right">
            <p class="dialogue-text" id="dialogueText"></p>
            <span class="dialogue-continue" id="dialogueContinue">Press SPACE to continue</span>
          </div>
        </div>
      </main>
    </div>

    <script src="dialogue.js"></script>
    <script src="play.js"></script>
    <script src="scene1.js"></script>
    <script src="scene2.js"></script>
    <script src="scene3.js"></script>
    <script src="scene4.js"></script>
    <script src="scene5.js"></script>
    <script src="scene6.js"></script>
    <script src="scene7.js"></script>
    <script src="scene8.js"></script>
    <script src="scene9.js"></script>
    <script src="scene10.js"></script>
    <script src="game.js"></script>
  </body>
  </html>
